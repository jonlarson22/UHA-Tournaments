<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/brackets-viewer@latest/dist/brackets-viewer.min.css" />
</head>
<body class="uha-dark-theme">

    <header>
        <h1>UHA Tournament Dashboard</h1>
        <div id="connection-status">Connecting to Firebase...</div>
    </header>

    <main>
            <section id="setup-container">
        <h2>1. Select & Pair Players</h2>
        <div class="setup-columns">
            <div class="column">
                <h3>UHA Roster</h3>
                <input type="text" id="player-search" placeholder="Search...">
                <div id="player-list" class="drop-zone"></div>
            </div>
    
            <div class="column">
                <h3>Tournament Teams</h3>
                <div id="team-draft-area" class="drop-zone">
                    </div>
                <button id="add-team-btn">+ New Team</button>
            </div>
        </div>
        
        <h2>2. Config</h2>
        <div class="config-row">
            <label>Format:</label>
            <select id="tourney-type">
                <option value="round_robin">Round Robin ➔ Bracket</option>
                <option value="single_elim">Single Elimination</option>
            </select>
        </div>
        <button id="btn-start" class="primary-btn">Launch Tournament</button>
    </section>

        <section id="tournament-view">
            <div id="brackets-container" class="brackets-viewer"></div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
