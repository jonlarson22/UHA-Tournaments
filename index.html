<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast" style="display: none; opacity: 0; transition: all 0.3s; position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: white; padding: 12px 24px; border-radius: 8px; z-index: 10000; font-weight: bold;"></div>
    
    <div class="uha-container">
        <header class="uha-header">
            <h1>UTAH HANDBALL ASSOCIATION</h1>
            <p>Tournament Dashboard</p>
            <div id="connection-status" style="font-size: 11px; margin-top: 5px; color:#888;">Connecting to Firebase...</div>
            <div class="divider"></div>
        </header>

        <main>
            <section id="setup-container">
                <div class="section-title">1. Tournament Mode</div>
                
                <div class="mode-toggle">
                    <button class="mode-btn active" id="btn-mode-singles">Singles</button>
                    <button class="mode-btn" id="btn-mode-doubles">Doubles</button>
                </div>

                <div class="section-title">2. Draft Participants</div>
                <div class="setup-columns">
                    <div class="column">
                        <input type="text" id="player-search" placeholder="Search players...">
                        <div id="player-list"></div>
                    </div>

                    <div class="column">
                        <div id="team-draft-area"></div>
                    </div>
                </div>
                
                <div class="divider"></div>
                <div class="section-title">3. Finalize Config</div>
                <button id="btn-start" class="uha-btn">Launch Tournament</button>
            </section>

            <section id="tournament-view" style="display:none;">
                <div class="section-title" id="tourney-title">Round Robin Matchups</div>
                <div id="matchup-container"></div>
                <button onclick="location.reload()" class="uha-btn-outline" style="margin-top:20px;">End Tournament</button>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
