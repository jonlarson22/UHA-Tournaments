<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="uha-container">
    <header class="uha-header">
        <h1>UHA Tournament Dashboard</h1>
        <div id="connection-status">Connecting to Firebase...</div>
    </header>

    <section id="public-viewer" style="display:none;" class="column">
        <div class="section-title">Live Tournament Brackets</div>
        <select id="public-tournament-selector">
            <option value="active">Current Live Tournament</option>
        </select>
        <div id="public-bracket-container" style="text-align: center; color: var(--text-muted); padding: 20px;">Loading brackets...</div>
    </section>

    <section id="admin-dashboard">
        <div class="setup-columns">
            
            <div class="column">
                <div class="section-title">1. Config & Wildcards</div>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="btn-mode-singles">Singles</button>
                    <button class="mode-btn" id="btn-mode-doubles">Doubles</button>
                </div>
                
                <div class="input-group">
                    <input type="text" id="wildcard-name" placeholder="Wildcard Name..." style="flex: 2; margin-bottom: 0;">
                    <input type="number" id="wildcard-elo" placeholder="ELO" value="1000" style="flex: 1; margin-bottom: 0;">
                    <button id="btn-add-wildcard" class="uha-btn" style="width: auto; padding: 10px;">+ Add</button>
                </div>

                <div class="section-title" style="margin-top: 30px;">2. Division</div>
                <input type="text" id="division-name" placeholder="e.g. Open, A, B..." value="Open Division">
                <select id="tourney-type">
                    <option value="single_elim">Knockout Bracket</option>
                    <option value="round_robin">Round Robin</option>
                </select>
                <button id="btn-lock-division" class="uha-btn uha-btn-gold">Lock Division</button>
                
                <div id="locked-divisions-list" style="margin-top: 15px; font-size: 14px; color: var(--uha-blue);"></div>

                <button id="btn-start" class="uha-btn" style="margin-top: 30px;">Preview & Push to Live</button>
            </div>

            <div class="column">
                <div class="section-title">Players</div>
                <input type="text" id="player-search" placeholder="Search players...">
                <div id="player-list"></div>
            </div>

            <div class="column">
                <div class="section-title" id="draft-header">Selected Players</div>
                <div id="team-draft-area"></div>
            </div>

        </div>
    </section>

    <section id="tournament-view" style="display:none;" class="column">
        <div class="section-title" id="tourney-title">Tournament Preview</div>
        <div id="matchup-container"></div>
        <button onclick="location.reload()" class="uha-btn-outline" style="margin-top: 20px;">Reset / Back to Setup</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="app.js"></script>

</body>
</html>
