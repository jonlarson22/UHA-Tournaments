<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="uha-container">
    <div style="border-bottom: 2px solid var(--uha-blue); padding-bottom: 20px; margin-bottom: 30px; text-align: center;">
        <h2 id="header-title" style="color: var(--uha-blue); margin: 0; font-size: 32px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 4px 10px rgba(52,152,219,0.3); cursor: pointer;" title="Admin Access">
            Utah Handball Association
        </h2>
        <h3 style="color: var(--uha-gold); margin-top: 5px; font-weight: normal; letter-spacing: 1px; margin-bottom: 0; text-transform: uppercase;">
            Tournament Dashboard
        </h3>
    </div>
    
    <section id="admin-dashboard">

        <button class="uha-btn" onclick="goToBracketView()" style="margin-bottom: 20px; background-color: var(--uha-gold); color: black;">
            👀 View Live Bracket / Enter Scores
        </button>
        
        <div class="setup-columns">
            
            <div class="column">
                <div class="section-title">Tournament Name</div>
                    <input type="text" id="tournament-name" placeholder="Tournament Title (e.g., 2026 State Doubles)" class="uha-input" style="width: 95%; margin-bottom: 30px; font-size: 16px;">
                <div class="section-title">Configuration</div>
                    <div class="mode-toggle">
                    <button class="mode-btn active" id="btn-mode-singles">Singles</button>
                    <button class="mode-btn" id="btn-mode-doubles">Doubles</button>
                    </div>
            
                <div class="section-title">Format</div>
                    <select id="division-format" class="uha-input" style="width: 100%; margin-bottom: 10px;" onchange="toggleFormatOptions()">
                        <option value="single_elim">Single Elimination Knockout</option>
                        <option value="double_elim">Double Elimination</option>
                        <option value="round_robin">Standard Round Robin (1 Group)</option>
                        <option value="multi_group_rr">Multi-Group Round Robin</option>
                    </select>
                    
                    <div id="double-elim-settings" style="display: none; background: #222; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 3px solid var(--uha-red);">
                        <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 5px;">Grand Final Rules:</div>
                        <select id="double-elim-final" class="uha-input" style="width: 100%;">
                            <option value="true_double">True Double Elimination</option>
                            <option value="one_match">Winner Takes All Final</option>
                        </select>
                    </div>

                <input type="text" id="division-name" placeholder="Enter Division Name" class="uha-input" style="margin-bottom: 15px; width: 100%;">
                                                
                    <div id="multi-group-settings" style="display:none; background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 15px;">
                        <div style="font-size: 12px; color: var(--uha-gold); margin-bottom: 5px;">Group Settings</div>
                        <input type="number" id="num-groups" placeholder="# of Groups" class="uha-input" style="width: 45%; display: inline-block;">
                        <select id="multi-group-advancement" class="uha-input" style="width: 45%; display: inline-block;">
                            <option value="all_to_single">Everyone to Single Bracket</option>
                            <option value="single_bracket">Top 2 to Championship Bracket</option>
                            <option value="split_bracket">Top 2 to Winners, Rest to Consolation</option>
                        </select>
                    </div>
                <button id="btn-lock-division" class="uha-btn uha-btn-gold" style="margin-top: 5px;">Lock Division</button>
                
                <div id="locked-divisions-list" style="margin-top: 10px; font-size: 14px; color: var(--uha-blue);"></div>

                <button id="btn-start" class="uha-btn" style="margin-top: 15px;">Start Tournament</button>

                <button id="btn-edit-active" class="uha-btn-outline" onclick="editActiveTournament()" style="margin-top: 10px; border-color: var(--uha-blue); color: var(--uha-blue);">
                    Edit Live Tournament Setup
                </button>
                
                <button class="uha-btn uha-btn-outline" onclick="openManualMoveModal()" style="margin-top: 10px; border-color: #e74c3c; color: #e74c3c;">
                    🚀 Manual Bracket Override
                </button>
            </div>

            <div class="column">
               <div class="section-title">Players</div>

                <div class="input-group" style="flex-wrap: wrap; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #333;">
                    <input type="text" id="new-player-name" placeholder="New Player Name" style="flex: 2; min-width: 150px; margin-bottom: 5px;">
                    
                    <div style="display: flex; gap: 5px; flex: 1; min-width: 170px; margin-bottom: 5px;">
                        <input type="number" id="new-player-singles" placeholder="Singles" value="1000" style="width: 50%;">
                        <input type="number" id="new-player-doubles" placeholder="Doubles" value="1000" style="width: 50%;">
                    </div>
                
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" id="new-player-member" checked style="width: auto; margin: 0; cursor: pointer;">
                            <label for="new-player-member" style="font-size: 12px; color: var(--text-muted); cursor: pointer;">UHA Member</label>
                        </div>
                        <button id="btn-add-player" class="uha-btn" style="width: auto; padding: 8px 15px;">+ Add to Database</button>
                    </div>
                </div>
                
                <input type="text" id="player-search" placeholder="UHA Player Search...">
                <div id="player-list"></div>
            </div>

            <div class="column">
                <div class="section-title" id="draft-header">Selected Players</div>
                <div id="team-draft-area"></div>
            </div>

        </div>
    </section>

    <section id="tournament-view" style="display:none;" class="column">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 8px;">
            
            <div style="flex: 1;">
               <h2 id="tourney-title" class="your-yellow-text-class">Live Tournament</h2>
            </div>

            <div style="flex: 1; text-align: center;">
                <button id="btn-back-setup" class="uha-btn-outline" onclick="goToSetupView()" style="display: none; border-color: var(--uha-blue); color: var(--uha-blue);">
                    ⚙️ Back to Admin Setup
                </button>
            </div>

            <div style="flex: 1; text-align: right;">
                <label for="public-tournament-selector" style="margin-right: 10px; font-weight: bold; color: var(--uha-blue);">View Event:</label>
                <select id="public-tournament-selector" class="uha-input" style="width: auto; min-width: 250px;">
                    <option value="active">Current Live Tournament</option>
                </select>
            </div>

        </div>
        
        <div id="matchup-container"></div>
        
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button id="btn-reset" onclick="location.reload()" class="uha-btn-outline" style="flex: 1;">Back to Setup / Refresh</button>
            <button id="btn-archive" class="uha-btn-outline" onclick="archiveTournament()" style="display:none; flex: 1; border-color: var(--uha-gold); color: var(--uha-gold);">Archive Finished Tournament</button>
        </div>
    </section>

    <div style="display:flex; justify-content: space-between; align-items:center; margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 15px;">
            <button id="btn-logout" class="uha-btn-outline" style="display:none; padding: 5px 15px; font-size: 12px; width: auto;" onclick="logoutAdmin()">Logout</button>
            <div id="connection-status" style="font-size: 12px; color: var(--text-muted);">Connecting to Firebase...</div>
        </div>
    
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<div id="score-modal" class="uha-modal" style="display:none;">
    <div class="uha-modal-content">
        <h2 id="score-modal-title" style="color: var(--uha-gold);">Enter Score</h2>
        <div id="score-modal-body"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button class="uha-btn uha-btn-gold" onclick="saveScore()">Save Match</button>
            <button class="uha-btn-outline" onclick="closeScoreModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="login-modal" class="uha-modal" style="display:none;">
    <div class="uha-modal-content">
        <h2 style="color: var(--uha-gold);">Admin Login</h2>
        <input type="email" id="admin-email" placeholder="Email" class="uha-input" style="width: 90%; margin-bottom: 10px;">
        <input type="password" id="admin-pwd" placeholder="Password" class="uha-input" style="width: 90%; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="uha-btn" onclick="loginAdmin()">Login</button>
            <button class="uha-btn-outline" onclick="document.getElementById('login-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<div id="manual-move-modal" class="uha-modal" style="display:none;">
    <div class="uha-modal-content" style="max-width: 500px;">
        <h2 style="color: var(--uha-gold);">Manual Move Tool</h2>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Force a player into a specific bracket slot.</p>
        
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Select Division:</label>
            <select id="move-div-idx" class="uha-input" style="width:100%"></select>
        </div>

        <div style="text-align: left; margin-bottom: 15px;">
            <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Player Exact Name:</label>
            <input type="text" id="move-player-name" placeholder="e.g. John Doe" class="uha-input" style="width:100%;">
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px; text-align:left;">
            <div style="flex:1">
                <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Target Bracket:</label>
                <select id="move-target-bracket" class="uha-input" style="width:100%">
                    <option value="bracket">Winners</option>
                    <option value="losersBracket">Losers</option>
                    <option value="finalsBracket">Finals</option>
                </select>
            </div>
            <div style="flex:1">
                <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Round #:</label>
                <input type="number" id="move-target-round" placeholder="1" class="uha-input" style="width:100%;">
            </div>
            <div style="flex:1">
                <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Match #:</label>
                <input type="number" id="move-target-match" placeholder="1" class="uha-input" style="width:100%;">
            </div>
        </div>

        <div style="margin-bottom: 25px; text-align:left;">
            <label style="color:var(--uha-blue); font-weight:bold; font-size: 14px;">Target Slot:</label>
            <select id="move-target-slot" class="uha-input" style="width:100%">
                <option value="p1">Top Slot (p1)</option>
                <option value="p2">Bottom Slot (p2)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="uha-btn uha-btn-gold" onclick="executeManualMove()">Confirm Move</button>
            <button class="uha-btn-outline" onclick="document.getElementById('manual-move-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>
    
<script src="app.js"></script>

</body>
</html>
