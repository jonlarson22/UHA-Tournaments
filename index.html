<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="uha-container">
    <header class="uha-header">
        <h1>UHA Tournament Dashboard</h1>
        <div id="connection-status">Connecting to Firebase...</div>
    </header>

    <section id="public-viewer" style="display:none;" class="column">
        <div class="section-title">Live Tournament Brackets</div>
        <select id="public-tournament-selector">
            <option value="active">Current Live Tournament</option>
        </select>
        <div id="public-bracket-container" style="text-align: center; color: var(--text-muted); padding: 20px;">Loading brackets...</div>
    </section>

    <section id="admin-dashboard">
        <div class="setup-columns">
            
            <div class="column">
                <div class="section-title">Configuration</div>
                    <div class="mode-toggle">
                    <button class="mode-btn active" id="btn-mode-singles">Singles</button>
                    <button class="mode-btn" id="btn-mode-doubles">Doubles</button>
                    </div>
            
                <div class="input-group">
                    <select id="format-select" class="uha-input";">
                        <option value="single_elim">Straight Knockout</option>
                        <option value="double_elim">Double Elimination</option>
                        <option value="round_robin">Standard Round Robin</option>
                        <option value="multi_group_rr">Multi-Group Round Robin</option>
                    </select>
                </div>

                <input type="text" id="division-name" placeholder="Enter Division Name" class="uha-input" style="margin-bottom: 15px; width: 100%;">
                                
                    <div id="multi-group-settings" style="display:none; background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 15px;">
                        <div style="font-size: 12px; color: var(--uha-gold); margin-bottom: 5px;">Group Settings</div>
                        <input type="number" id="num-groups" placeholder="# of Groups" class="uha-input" style="width: 45%; display: inline-block;">
                        <select id="multi-group-advancement" class="uha-input" style="width: 45%; display: inline-block;">
                            <option value="single_bracket">Top 2 to Single Bracket</option>
                            <option value="split_bracket">Top 2 to Winners, Rest to Consolation</option>
                        </select>
                    </div>
                <button id="btn-lock-division" class="uha-btn uha-btn-gold" style="margin-top: 5px;">Lock Division</button>
                
                <div id="locked-divisions-list" style="margin-top: 10px; font-size: 14px; color: var(--uha-blue);"></div>

                <button id="btn-start" class="uha-btn" style="margin-top: 15px;">Start Tournament</button>
            </div>

            <div class="column">
                <div class="section-title">Players</div>
                 
                <div class="input-group">
                    <input type="text" id="wildcard-name" placeholder="Enter Wildcard Name" style="flex: 2; margin-bottom: 0;">
                    <input type="number" id="wildcard-elo" placeholder="ELO" value="1000" style="flex: 1; margin-bottom: 0;">
                    <button id="btn-add-wildcard" class="uha-btn" style="width: auto; padding: 10px;">+ Add</button>
                </div>
                
                <input type="text" id="player-search" placeholder="UHA Player Search...">
                <div id="player-list"></div>
            </div>

            <div class="column">
                <div class="section-title" id="draft-header">Selected Players</div>
                <div id="team-draft-area"></div>
            </div>

        </div>
    </section>

    <section id="tournament-view" style="display:none;" class="column">
        <div class="section-title" id="tourney-title">Live Tournament</div>
        <div id="matchup-container"></div>
        <button id="btn-reset" onclick="location.reload()" class="uha-btn-outline" style="margin-top: 20px;">Reset / Back to Setup</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <div id="score-modal" class="uha-modal" style="display:none;">
        <div class="uha-modal-content">
            <h2 id="score-modal-title" style="color: var(--uha-gold);">Enter Score</h2>
            <div id="score-modal-body"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button class="uha-btn uha-btn-gold" onclick="saveScore()">Save Match</button>
                <button class="uha-btn-outline" onclick="closeScoreModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="uha-modal" style="display:none;">
        <div class="uha-modal-content">
            <h2 style="color: var(--uha-gold);">Admin Login</h2>
            <input type="email" id="admin-email" placeholder="Email" class="uha-input" style="width: 90%; margin-bottom: 10px;">
            <input type="password" id="admin-pwd" placeholder="Password" class="uha-input" style="width: 90%; margin-bottom: 20px;">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="uha-btn" onclick="loginAdmin()">Login</button>
                <button class="uha-btn-outline" onclick="document.getElementById('login-modal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>
    
<script src="app.js"></script>

</body>
</html>
