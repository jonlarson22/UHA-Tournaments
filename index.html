<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UHA Tournament</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="uha-container">
    <header>
        <h1>UHA Tournament Dashboard</h1>
        <div id="connection-status" style="font-size: 12px; color: #888;">Connecting...</div>
    </header>

    <section id="admin-dashboard" class="dashboard-grid">
        <div class="column">
            <h3>1. Division Config</h3>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <button id="btn-mode-singles" class="uha-btn btn-primary" style="flex:1;">Singles</button>
                <button id="btn-mode-doubles" class="uha-btn btn-dark" style="flex:1;">Doubles</button>
            </div>
            
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="wc-name" placeholder="Wildcard Name" style="margin:0;">
                <button id="btn-add-wc" class="uha-btn btn-dark" style="width: auto;">+</button>
            </div>

            <input type="text" id="division-name" placeholder="Division Name (e.g. Open A)" value="Open Division">
            <select id="tourney-type">
                <option value="single_elim">Knockout Bracket</option>
                <option value="round_robin">Round Robin</option>
            </select>

            <button id="btn-lock" class="uha-btn btn-gold">Lock Division</button>
            <div id="locked-log" style="margin-top:15px; font-size:13px;"></div>
            
            <button id="btn-launch" class="uha-btn btn-primary" style="margin-top:20px;">Preview Tournament</button>
        </div>

        <div class="column-wide">
            <div class="column">
                <h3>Players</h3>
                <input type="text" id="player-search" placeholder="Search players...">
                <div id="player-list"></div>
            </div>

            <div class="column">
                <h3 id="draft-header">Selected Players</h3>
                <div id="team-draft-area"></div>
            </div>
        </div>
    </section>

    <section id="tournament-view" style="display:none;" class="column">
        <h2 id="view-title">Tournament Preview</h2>
        <div id="bracket-view" class="bracket-container"></div>
        <div id="rr-view"></div>
        <button onclick="location.reload()" class="uha-btn btn-dark" style="margin-top:20px; width:200px;">Reset Setup</button>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/brackets-viewer@latest/dist/brackets-viewer.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="app.js"></script>
</body>
</html>
